<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Media Viewer</title>

        <style>
            :root {
                --bg-dark: #121212;
                --bar-bg: #1b1c28;
                --border-color: #3f4058;
                --text-main: #eeeeee;
                
                /* Danbooru Tag Colors */
                --color-artist: #ff8a8b;
                --color-character: #00ab2c;
                --color-copyright: #c797ff;
                --color-general: #b4bdff;
                --color-meta: #ff9200;
            }

            body {
                margin: 0;
                background: black;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            #container {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
                background-color: var(--bg-dark);
            }

            #tags {
                flex-shrink: 0;
                padding: 10px;
                background: var(--bar-bg);
                border-top: 1px solid var(--border-color);
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 8px;
                max-height: 30vh;
                overflow-y: auto;
                scrollbar-width: thin;
                scrollbar-color: #3f4058 transparent;
            }

            /* Custom scrollbar for Chrome/Safari */
            #tags::-webkit-scrollbar { width: 6px; }
            #tags::-webkit-scrollbar-thumb { background: #3f4058; border-radius: 10px; }

            #tags:empty {
                display: none;
            }

            .tag-group {
                display: inline-flex;
                align-items: stretch;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 4px;
                overflow: hidden;
                border: 1px solid var(--border-color);
                transition: transform 0.1s ease;
            }

            .tag-group:hover {
                border-color: #666;
            }

            .tag-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                text-decoration: none;
                color: #fff;
                font-size: 18px;
                font-weight: bold;
                transition: background 0.2s;
                user-select: none;
            }

            .tag-btn.add { background: #2d4a2d; border-right: 1px solid var(--border-color); }
            .tag-btn.add:hover { background: #3d633d; }

            .tag-btn.rem { background: #4a2d2d; border-right: 1px solid var(--border-color); }
            .tag-btn.rem:hover { background: #633d3d; }

            .tag {
                display: flex;
                align-items: center;
                padding: 0 10px;
                text-decoration: none;
                font-size: 13px;
                font-weight: 500;
                white-space: nowrap;
                transition: filter 0.2s;
            }

            .tag:hover {
                filter: brightness(1.2);
                text-decoration: underline;
            }

            /* Category Specific Colors */
            .tag-artist { color: var(--color-artist) !important; }
            .tag-character { color: var(--color-character) !important; }
            .tag-copyright { color: var(--color-copyright) !important; }
            .tag-general { color: var(--color-general) !important; }
            .tag-meta { color: var(--color-meta) !important; }

            img, video {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
            }
        </style>
    </head>

    <body>

        <div id="container"></div>
        <div id="tags"></div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

        <script>
            const container = document.getElementById("container");
            const params = new URLSearchParams(window.location.search);
            const src = params.get("src");
            const postId = params.get("id");

            if (!src) {
                container.innerHTML = "<div style='color:white'>No media provided</div>";
            }

            function getExt(url) {
                return url.split("?")[0].split(".").pop().toLowerCase();
            }

            const ext = getExt(src || "");

            // Fullscreen Toggle
            document.body.addEventListener("dblclick", () => {
                if (!document.fullscreenElement) {
                    document.body.requestFullscreen().catch(e => console.error(e));
                } else {
                    document.exitFullscreen();
                }
            });

            function playVideo(url) {
                const video = document.createElement("video");
                video.src = url;
                video.loop = true;
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true;
                video.controls = true;
                video.addEventListener("click", () => video.paused ? video.play() : video.pause());
                container.innerHTML = "";
                container.appendChild(video);
            }

            function showImage(url) {
                const img = document.createElement("img");
                img.src = url;
                container.innerHTML = "";
                container.appendChild(img);
            }

            async function playZip(url) {
                try {
                    const res = await fetch(url);
                    const blob = await res.blob();
                    const zip = await JSZip.loadAsync(blob);
                    const animFile = zip.file("animation.json");

                    if (!animFile) {
                        container.innerHTML = "❌ Missing animation.json";
                        return;
                    }

                    const anim = JSON.parse(await animFile.async("string"));
                    const frames = anim.frames;
                    const loaded = [];

                    for (const f of frames) {
                        const file = zip.file(f.file);
                        if (!file) continue;
                        const b = await file.async("blob");
                        const u = URL.createObjectURL(b);
                        const img = new Image();
                        img.src = u;
                        loaded.push({ img, delay: f.delay ?? 100 });
                    }

                    let i = 0;
                    function loop() {
                        if (loaded.length === 0) return;
                        container.innerHTML = "";
                        container.appendChild(loaded[i].img);
                        const delay = loaded[i].delay;
                        i = (i + 1) % loaded.length;
                        setTimeout(loop, delay);
                    }
                    loop();
                } catch (e) {
                    container.innerHTML = "❌ Error loading ZIP animation";
                }
            }

            async function loadTags() {
                if (!postId) return;
                try {
                    const res = await fetch(`https://danbooru.donmai.us/posts/${postId}.json`);
                    if (!res.ok) return;
                    const post = await res.json();

                    const sections = [
                        ["tag-artist", post.tag_string_artist],
                        ["tag-character", post.tag_string_character],
                        ["tag-copyright", post.tag_string_copyright],
                        ["tag-general", post.tag_string_general],
                        ["tag-meta", post.tag_string_meta]
                    ];

                    const tagsEl = document.getElementById("tags");
                    tagsEl.innerHTML = "";

                    sections.forEach(([cls, tagString]) => {
                        if (!tagString) return;
                        tagString.split(" ").forEach(tag => {
                            const group = document.createElement("div");
                            group.className = "tag-group";

                            const btnAdd = document.createElement("a");
                            btnAdd.className = "tag-btn add";
                            btnAdd.textContent = "+";
                            btnAdd.href = `index.html?addtag=${encodeURIComponent(tag)}`;

                            const btnRem = document.createElement("a");
                            btnRem.className = "tag-btn rem";
                            btnRem.textContent = "-";
                            btnRem.href = `index.html?remtag=${encodeURIComponent(tag)}`;

                            const a = document.createElement("a");
                            a.className = cls + " tag";
                            a.textContent = tag.replace(/_/g, " ");
                            a.href = `index.html?addtag=${encodeURIComponent(tag)}`;

                            group.append(btnAdd, btnRem, a);
                            tagsEl.appendChild(group);
                        });
                    });
                } catch (err) {
                    console.error("Failed to load tags:", err);
                }
            }

            (async function init() {
                if (!src) return;
                const videoExts = ["mp4", "webm"];
                const imageExts = ["jpg", "jpeg", "png", "gif", "webp"];

                if (videoExts.includes(ext)) playVideo(src);
                else if (imageExts.includes(ext)) showImage(src);
                else if (ext === "zip") await playZip(src);
                else container.innerHTML = "❌ Unsupported format";

                await loadTags();
            })();
        </script>
    </body>
</html>
