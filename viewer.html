<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Media Viewer</title>

<link rel="stylesheet" href="styles.css">

<style>
    body {
    margin: 0;
    background: black;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

#container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

#tags {
    padding: 12px;
    background: #1b1c28;
    border-top: 1px solid #3f4058;
    line-height: 1.8;
    font-family: sans-serif;
    align-items: center;
}

#tags span,
#tags a {
    display: inline-block;
    margin-right: 8px;
}

.tag {
    display: inline-block;
    margin: 2px;
    padding: 4px 8px;
    border-radius: 4px;
    background: transparent;
    border: #5d8fff 1px solid;
}

    img, video {
        max-width: 100vw;
        max-height: 100vh;
        object-fit: contain;
    }
</style>
</head>
<body>

<div id="container"></div>

<div id="tags"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const container = document.getElementById("container");

const params = new URLSearchParams(window.location.search);
const src = params.get("src");
const postId = params.get("id");

if (!src) {
    container.innerHTML = "No media provided";
    throw new Error("Missing src");
}

// ----------- helpers -----------

function getExt(url) {
    return url.split("?")[0].split(".").pop().toLowerCase();
}

const ext = getExt(src);

// ----------- FULLSCREEN TOGGLE -----------

document.body.addEventListener("dblclick", () => {
    if (!document.fullscreenElement) {
        document.body.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

// ----------- VIDEO -----------

function playVideo(url) {
    const video = document.createElement("video");

    video.src = url;
    video.loop = true;
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;
    video.controls = true;

    video.addEventListener("click", () => {
        video.paused ? video.play() : video.pause();
    });

    container.innerHTML = "";
    container.appendChild(video);
}

// ----------- IMAGE -----------

function showImage(url) {
    const img = document.createElement("img");
    img.src = url;

    container.innerHTML = "";
    container.appendChild(img);
}

// ----------- ZIP ANIMATION -----------

async function playZip(url) {
    const res = await fetch(url);
    const blob = await res.blob();

    const zip = await JSZip.loadAsync(blob);

    // IMPORTANT: use animation.json (not meta.json)
    const animFile = zip.file("animation.json");

    if (!animFile) {
        container.innerHTML = "❌ Missing animation.json";
        return;
    }

    const anim = JSON.parse(await animFile.async("string"));

    const frames = anim.frames;

    if (!frames || frames.length === 0) {
        container.innerHTML = "❌ No frames found in animation.json";
        return;
    }

    const loaded = [];

    for (const f of frames) {
        const file = zip.file(f.file);

        if (!file) {
            console.warn("Missing frame:", f.file);
            continue;
        }

        const blob = await file.async("blob");
        const url = URL.createObjectURL(blob);

        const img = new Image();
        img.src = url;

        loaded.push({
            img,
            delay: f.delay ?? 100
        });
    }

    if (loaded.length === 0) {
        container.innerHTML = "❌ No valid frames loaded";
        return;
    }

    let i = 0;

    function loop() {
        container.innerHTML = "";
        container.appendChild(loaded[i].img);

        const delay = loaded[i].delay;

        i = (i + 1) % loaded.length;

        setTimeout(loop, delay);
    }

    loop();
}

// ----------- TAGS -----------

async function loadTags() {
    if (!postId) return;

    try {
        const res = await fetch(
            `https://danbooru.donmai.us/posts/${postId}.json`
        );

        if (!res.ok) return;

        const post = await res.json();

        const sections = [
            ["tag-artist", post.tag_string_artist],
            ["tag-character", post.tag_string_character],
            ["tag-copyright", post.tag_string_copyright],
            ["tag-general", post.tag_string_general],
            ["tag-meta", post.tag_string_meta]
        ];

        const tagsEl = document.getElementById("tags");
        tagsEl.innerHTML = "";

        for (const [cls, tagString] of sections) {
            if (!tagString) continue;

            for (const tag of tagString.split(" ")) {
                const a = document.createElement("a");
                a.className = cls + " tag";
                a.textContent = tag;
                a.href = `index.html?tag=${encodeURIComponent(tag)}`;
                a.style.marginRight = "8px";

                tagsEl.appendChild(a);
            }
        }
    } catch (err) {
        console.error(err);
    }
}

// ----------- ROUTER -----------

(async function init() {
    const videoExts = ["mp4", "webm"];
    const imageExts = ["jpg", "jpeg", "png", "gif"];

    if (videoExts.includes(ext)) {
        playVideo(src);
    }

    else if (imageExts.includes(ext)) {
        showImage(src);
    }

    else if (ext === "zip") {
        await playZip(src);
    }

    else {
        container.innerHTML = "❌ Unsupported format";
    }
    await loadTags();
})();
</script>

</body>
</html>
